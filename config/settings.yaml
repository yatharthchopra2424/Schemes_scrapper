crawler:
  browser: chrome
  headless: true
  page_load_timeout_seconds: 45
  render_wait_seconds: 2
  max_depth: 2
  max_pages_per_scheme: 15
  max_documents_per_scheme: 20
  user_agent: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36"
  disable_images: true

compliance:
  strict_mode: true
  min_delay_seconds: 2.0
  request_timeout_seconds: 20

documents:
  enable_extraction: true
  max_document_mb: 15

llm:
  provider: nvidia_openai_compat
  base_url: "https://integrate.api.nvidia.com/v1"
  model: "meta/llama-3.3-70b-instruct"
  temperature: 0.2
  top_p: 0.95
  max_tokens: 9880
  timeout_seconds: 120
  max_retries: 3

runtime:
  parallel_workers: 2
  log_level: "INFO"
  log_to_file: true

output:
  root_dir: "runs"
  enriched_csv_name: "enriched_schemes.csv"
  checkpoint_name: "checkpoint.json"

vector_db:
  index_name: "infou-scheme-index"
  embedding_model: "all-MiniLM-L6-v2"
  chunk_size: 1000
  chunk_overlap: 100
